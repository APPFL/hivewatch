name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for OIDC trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check version matches release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(grep -Po '^version\s*=\s*"\K[^"]+' pyproject.toml)
          TAG="${{ github.event.release.tag_name }}"
          if [ "v${PKG_VERSION}" != "${TAG}" ]; then
            echo "pyproject.toml version (v${PKG_VERSION}) does not match tag (${TAG})"
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
