name: pre-release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to publish from (must start with 'pre-release')"
        required: true
        default: "pre-release"

permissions:
  contents: read
  id-token: write  # required for OIDC trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Ensure branch starts with pre-release
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          if [[ "$BRANCH" != pre-release* ]]; then
            echo "Branch '$BRANCH' is not a pre-release branch. Aborting."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep -Po '^version\s*=\s*"\K[^"]+' pyproject.toml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Ensure version is a pre-release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" != *".dev"* && "$VERSION" != *"a"* && "$VERSION" != *"b"* && "$VERSION" != *"rc"* ]]; then
            echo "Version '$VERSION' is not a pre-release (expected .dev / aN / bN / rcN suffix). Aborting."
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi-pre-release
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish pre-release to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
