[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fedviz"
version = "0.1.0"
description = "Framework-agnostic monitoring toolkit for federated and distributed ML"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.8"

[project.optional-dependencies]
wandb  = ["wandb>=0.16"]
ray    = ["ray>=2.9"]
all    = ["wandb>=0.16", "ray>=2.9"]
dev    = ["pytest", "wandb>=0.16"]



[tool.setuptools.packages.find]
where = ["src"]
include = ["fedviz*"]
